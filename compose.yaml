services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: akhilaprime-hr-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: akhilaprime_hr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d akhilaprime_hr"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./postgres/init/01-enable-vector.sql:/docker-entrypoint-initdb.d/01-enable-vector.sql:ro

volumes:
  pgvector_data:
